<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklists de Inspeção — Axis Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
.content{flex:1;padding:20px;max-width:1300px;margin:0 auto;width:100%}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:12px;color:var(--tx3);margin-top:3px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:300px;min-width:160px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.sinput{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:inherit;font-size:13px;color:var(--tx);outline:none;transition:border .15s}
.sinput:focus{border-color:#2E6BE6;box-shadow:0 0 0 3px #EFF6FF}.sinput::placeholder{color:var(--tx3)}
.finput-date{padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:inherit;font-size:13px;color:var(--tx2);outline:none;transition:border .15s}
.finput-date:focus{border-color:#2E6BE6}
.cbadge{font-size:12px;font-weight:600;color:var(--tx3);padding:3px 9px;border-radius:20px;background:var(--sur2);white-space:nowrap}
.btn{padding:7px 13px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sur);color:var(--tx2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:var(--sur2);color:var(--tx)}.btn-sm{padding:5px 9px;font-size:12px}
.btn-p{background:#2E6BE6;border-color:#2E6BE6;color:#fff}.btn-p:hover{background:#1D4ED8;border-color:#1D4ED8;color:#fff}
.tcard{background:var(--sur);border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--sur2)}
th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--bd);color:var(--tx2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(27,42,74,.018)}
tr:hover td{background:rgba(46,107,230,.03)!important}
.mono{font-family:var(--mono);font-size:12px;color:var(--tx)}
.dim{color:var(--tx3);font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.man-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:var(--acl);color:var(--ac);border:1px solid var(--acm);white-space:nowrap}
.pag{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:6px}
.pag-info{font-size:12px;color:var(--tx3)}
.pag-ctrl{display:flex;gap:3px}
.pb{width:29px;height:29px;border-radius:7px;border:1px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;font-family:inherit}
.pb:hover:not(:disabled){background:var(--sur2)}.pb:disabled{opacity:.3;cursor:default}.pb.on{background:#2E6BE6;border-color:#2E6BE6;color:#fff}
.empty{text-align:center;padding:48px 20px;color:var(--tx3)}
.empty-icon{font-size:28px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.sk{background:linear-gradient(90deg,var(--sur2) 25%,var(--bd) 50%,var(--sur2) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:4px;height:13px;display:inline-block}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Lightbox fotos */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;cursor:zoom-out}
.lb.open{display:flex}.lb img{max-width:92vw;max-height:88vh;border-radius:8px}
.lb-x{position:fixed;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* Modal detalhe inspeção */
/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,20,50,.52);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--sur);border-radius:16px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.28);animation:mup .2s ease;display:flex;flex-direction:column}
@keyframes mup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Header do modal com faixa colorida */
.modal-hd{padding:0;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sur);z-index:1;border-radius:16px 16px 0 0;overflow:hidden}
.modal-hd-bar{background:linear-gradient(135deg,#1B2A4A 0%,#2E6BE6 100%);padding:18px 22px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-hd-bar h2{margin:0;font-size:16px;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1.3}
.modal-hd-bar .modal-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.modal-close{background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,.28)}

.modal-bd{padding:22px 24px;flex:1}
.modal-ft{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:14px 24px 18px;border-top:1px solid var(--bd);position:sticky;bottom:0;background:var(--sur)}
.modal-ft-left{display:flex;gap:8px}
.modal-ft-right{display:flex;gap:8px}

/* Seções do modal */
.msec{margin-bottom:20px}
.msec:last-child{margin-bottom:0}
.msec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#2E6BE6;padding-bottom:8px;border-bottom:2px solid #EFF6FF;margin-bottom:14px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px}
@media(max-width:520px){.mgrid{grid-template-columns:1fr}}
.mfield label{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mfield .mval{font-size:13px;color:var(--tx);line-height:1.4}
.mfield .mval.empty{color:var(--tx3);font-style:italic}
.mfield.full{grid-column:1/-1}

/* Acessórios */
.acess-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.acess-grid{grid-template-columns:1fr}}
.acess-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:1px solid var(--bd);background:var(--sur2)}
.acess-item .alabel{font-size:11px;font-weight:600;color:var(--tx2);flex:1}
.acess-item .aval{font-size:11px;font-weight:700;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#22c55e}.dot-nok{background:#ef4444}.dot-warn{background:#f59e0b}.dot-na{background:#d1d5db}
.val-ok{color:#15803d}.val-nok{color:#DC2626}.val-warn{color:#D97706}.val-na{color:var(--tx3)}

/* Fotos */
.foto-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.foto-grid a{display:block;border-radius:10px;overflow:hidden;border:2px solid var(--bd);transition:border-color .15s;flex-shrink:0}
.foto-grid a:hover{border-color:#2E6BE6}
.foto-grid a img{width:120px;height:90px;object-fit:cover;display:block}

/* Confirm delete overlay */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(10,20,50,.6);z-index:400;align-items:center;justify-content:center;padding:16px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--sur);border-radius:14px;width:100%;max-width:380px;padding:28px 24px 20px;box-shadow:0 24px 64px rgba(0,0,0,.3);text-align:center;animation:mup .18s ease}
.confirm-icon{width:52px;height:52px;border-radius:50%;background:#FEF2F2;border:2px solid #FECACA;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px}
.confirm-box h3{margin:0 0 8px;font-size:16px;font-weight:700;color:var(--tx)}
.confirm-box p{margin:0 0 20px;font-size:13px;color:var(--tx3);line-height:1.5}
.confirm-btns{display:flex;gap:8px;justify-content:center}

/* Print A4 */
#chk-print-area{display:none;font-family:Arial,Helvetica,sans-serif;background:#fff;width:100%;box-sizing:border-box}
#chk-pr-header{display:flex;align-items:center;gap:16px;border-bottom:3px solid #1B2A4A;padding-bottom:12px;margin-bottom:20px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#chk-pr-logo{width:44px;height:44px;background:#1B2A4A;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#chk-pr-title{font-size:20px;font-weight:800;color:#1B2A4A;line-height:1.2}
#chk-pr-sub{font-size:12px;color:#666;margin-top:2px}
#chk-pr-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;width:100%}
#chk-pr-fotos-sec{margin-bottom:16px}
.chk-pr-sec-lbl{font-size:10px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
#chk-pr-fotos{display:flex;gap:10px;flex-wrap:wrap}
#chk-pr-fotos img{width:180px;height:135px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
#chk-pr-footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #ddd;padding-top:12px;margin-top:24px}
#chk-pr-assin{text-align:center}
#chk-pr-assin-linha{width:200px;border-top:1px solid #333;margin:40px auto 4px}
#chk-pr-resp{font-size:12px;color:#666}
#chk-pr-rodape{font-size:10px;color:#999;text-align:right}

@media print{
  #sidebar-container,#tc,.toolbar,.page-head,.tcard,
  .overlay,.modal-ft,.confirm-overlay,
  .no-print{display:none!important}
  #chk-print-area{display:block!important;position:fixed;top:0;left:0;width:100%;background:#fff;z-index:9999}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div id="sidebar-container"></div>
<div class="sb-main"><div class="page">
<main class="content">
  <div id="app" style="display:none">
    <div class="page-head">
      <div>
        <div class="page-title">Checklists de Inspeção</div>
        <div class="page-sub" id="page-sub">Carregando...</div>
      </div>
      <button class="btn" style="background:#1B2A4A;border-color:#1B2A4A;color:#fff;font-weight:600" onmouseover="this.style.background='#2E6BE6';this.style.borderColor='#2E6BE6'" onmouseout="this.style.background='#1B2A4A';this.style.borderColor='#1B2A4A'" onclick="window.open('checklist-axis.html','_blank')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Checklist
      </button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="sinput" id="q" type="search" placeholder="Código, serial, modelo, responsável..." oninput="onQ(this.value)"/>
      </div>
      <input type="date" class="finput-date" id="f-de" onchange="onF()" title="Data inicial"/>
      <input type="date" class="finput-date" id="f-ate" onchange="onF()" title="Data final"/>
      <button class="btn btn-sm" id="btn-clear" onclick="limparF()" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Limpar
      </button>
      <span class="cbadge" id="cbadge">--</span>
    </div>

    <div class="tcard">
      <div class="twrap">
        <table>
          <thead><tr>
            <th>Data</th>
            <th>Código</th>
            <th>Modelo</th>
            <th>Serial</th>
            <th>Responsável</th>
            <th>Manutenções</th>
            <th></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pag" id="pag" style="display:none">
        <span class="pag-info" id="pag-info">--</span>
        <div class="pag-ctrl" id="pag-ctrl"></div>
      </div>
    </div>
  </div>
</main>
</div></div>

<!-- Lightbox fotos -->
<div class="lb" id="lb" onclick="closeLB()">
  <button class="lb-x" onclick="closeLB()">✕</button>
  <img id="lb-img" src="" alt=""/>
</div>

<!-- Modal detalhe inspeção -->
<div class="overlay" id="overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-hd-bar">
        <div>
          <h2 id="modal-titulo">Checklist de Inspeção</h2>
          <div class="modal-sub" id="modal-sub"></div>
        </div>
        <button class="modal-close" onclick="fecharModal()" title="Fechar">×</button>
      </div>
    </div>
    <div class="modal-bd" id="modal-corpo"></div>
    <div class="modal-ft">
      <button class="btn btn-sm btn-del" id="btn-excluir" onclick="confirmarExclusao()" style="display:none;margin-right:auto">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Excluir
      </button>
      <button class="btn btn-sm" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-sm btn-p" onclick="imprimirModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Salvar PDF
      </button>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
const POR_PAG = 25
var QS = { busca:'', de:'', ate:'', pagina:0, total:0 }
var todosRows = []
var rowsFiltrados = []

// -- CARREGAR ----------------------------------------------------------
async function carregar() {
  renderSkel()
  try {
    var r = await fetch(
      SURL + '/rest/v1/checklists_axis?select=*,itens!item_id(codigo_interno,modelo_id,modelos(modelo))&order=data_checklist.desc,criado_em.desc',
      { headers: hAuth() }
    )
    chk401(r)
    if (!r.ok) throw new Error((await r.json()).message || 'Erro ao carregar')
    todosRows = await r.json()
    aplicarFiltros()
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-t">' + esc(e.message) + '</div></div></td></tr>'
    toast(e.message, 'err')
  }
}

// -- FILTROS -----------------------------------------------------------
function aplicarFiltros() {
  var q = QS.busca.toLowerCase()
  rowsFiltrados = todosRows.filter(function(r) {
    var codigo = r.itens && r.itens.codigo_interno ? r.itens.codigo_interno : ''
    var modelo = r.modelo || (r.itens && r.itens.modelos && r.itens.modelos.modelo ? r.itens.modelos.modelo : '')
    var mQ = !q || [codigo, modelo, r.serial, r.responsavel, r.origem].some(function(v){ return v && v.toLowerCase().includes(q) })
    var mDe  = !QS.de  || (r.data_checklist || '') >= QS.de
    var mAte = !QS.ate || (r.data_checklist || '') <= QS.ate
    return mQ && mDe && mAte
  })
  QS.pagina = 0
  QS.total  = rowsFiltrados.length
  var n = QS.total
  document.getElementById('page-sub').textContent = n.toLocaleString('pt-BR') + ' checklist' + (n !== 1 ? 's' : '') + ' registrado' + (n !== 1 ? 's' : '')
  document.getElementById('cbadge').textContent = n.toLocaleString('pt-BR')
  renderTabela()
  renderPag()
}

var qt = null
var onQ = function(v) { clearTimeout(qt); qt = setTimeout(function(){ QS.busca = v.trim(); aplicarFiltros() }, 250) }

var onF = function() {
  QS.de  = document.getElementById('f-de').value
  QS.ate = document.getElementById('f-ate').value
  document.getElementById('btn-clear').style.display = (QS.de || QS.ate) ? '' : 'none'
  aplicarFiltros()
}

var limparF = function() {
  QS.de = ''; QS.ate = ''; QS.busca = ''
  document.getElementById('q').value = ''
  document.getElementById('f-de').value = ''
  document.getElementById('f-ate').value = ''
  document.getElementById('btn-clear').style.display = 'none'
  aplicarFiltros()
}

// -- RENDERIZAR TABELA -------------------------------------------------
var fdt = function(iso) {
  if (!iso) return '--'
  return new Date(iso + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'})
}

var renderSkel = function() {
  var rows = ''
  for (var i = 0; i < 8; i++) {
    rows += '<tr>'
    for (var j = 0; j < 7; j++) rows += '<td><span class="sk" style="width:' + (40 + Math.round(Math.random()*60)) + 'px"></span></td>'
    rows += '</tr>'
  }
  document.getElementById('tbody').innerHTML = rows
}

var renderTabela = function() {
  var ini = QS.pagina * POR_PAG
  var pag = rowsFiltrados.slice(ini, ini + POR_PAG)

  if (!pag.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-icon">&#x2705;</div><div class="empty-t">Nenhum checklist encontrado</div><div>Ajuste os filtros</div></div></td></tr>'
    document.getElementById('pag').style.display = 'none'
    return
  }

  var rows = ''
  for (var i = 0; i < pag.length; i++) {
    var c = pag[i]
    var codigo = c.itens && c.itens.codigo_interno ? c.itens.codigo_interno : '--'
    var modelo = c.modelo || (c.itens && c.itens.modelos && c.itens.modelos.modelo ? c.itens.modelos.modelo : '--')
    var mans = (c.manutencoes || []).slice(0, 3).map(function(m){ return '<span class="man-tag">' + esc(m) + '</span>' }).join(' ')
    if (c.manutencoes && c.manutencoes.length > 3) mans += ' <span class="dim">+' + (c.manutencoes.length - 3) + '</span>'
    var rmaTag = c.rma ? '<span style="margin-left:6px;font-size:11px;padding:1px 6px;border-radius:10px;background:rgba(220,38,38,.1);color:#DC2626;font-weight:600">RMA</span>' : ''
    rows += '<tr style="cursor:pointer" onclick="abrirModal(\'' + c.id + '\')">'
    rows += '<td class="dim" style="white-space:nowrap">' + fdt(c.data_checklist) + '</td>'
    rows += '<td><span class="mono">' + esc(codigo) + '</span></td>'
    rows += '<td style="font-weight:500;color:var(--tx)">' + esc(modelo) + '</td>'
    rows += '<td><span class="mono">' + esc(c.serial || '--') + '</span></td>'
    rows += '<td class="dim">' + esc(c.responsavel || '--') + rmaTag + '</td>'
    rows += '<td>' + (mans || '<span class="dim">--</span>') + '</td>'
    rows += '<td><button class="btn btn-sm btn-p" onclick="event.stopPropagation();abrirModal(\'' + c.id + '\')">'
    rows += '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Ver</button></td>'
    rows += '</tr>'
  }
  document.getElementById('tbody').innerHTML = rows

  var end = Math.min(ini + POR_PAG, QS.total)
  document.getElementById('pag-info').textContent = (ini + 1) + '-' + end + ' de ' + QS.total
  document.getElementById('pag').style.display = 'flex'
}

// -- PAGINAÇÃO ---------------------------------------------------------
var renderPag = function() {
  var total = Math.ceil(QS.total / POR_PAG)
  if (total <= 1) { document.getElementById('pag-ctrl').innerHTML = ''; return }
  var p = ''
  p += '<button class="pb" onclick="irP(' + (QS.pagina - 1) + ')" ' + (QS.pagina === 0 ? 'disabled' : '') + '>&lsaquo;</button>'
  for (var i = 0; i < total; i++) {
    if (i === 0 || i === total - 1 || Math.abs(i - QS.pagina) <= 2)
      p += '<button class="pb ' + (i === QS.pagina ? 'on' : '') + '" onclick="irP(' + i + ')">' + (i + 1) + '</button>'
    else if (Math.abs(i - QS.pagina) === 3)
      p += '<span style="color:var(--tx3);font-size:11px;padding:0 2px">...</span>'
  }
  p += '<button class="pb" onclick="irP(' + (QS.pagina + 1) + ')" ' + (QS.pagina >= total - 1 ? 'disabled' : '') + '>&rsaquo;</button>'
  document.getElementById('pag-ctrl').innerHTML = p
}

window.irP = function(p) {
  var t = Math.ceil(QS.total / POR_PAG)
  if (p < 0 || p >= t) return
  QS.pagina = p
  renderTabela(); renderPag()
  window.scrollTo({top: 0, behavior: 'smooth'})
}

// -- MODAL DETALHE -----------------------------------------------------
function abrirModal(id) {
  var r = todosRows.find(function(x){ return String(x.id) === String(id) })
  if (!r) return
  idAtualExcluir = id

  var codigo = r.itens && r.itens.codigo_interno ? r.itens.codigo_interno : '--'
  var modelo = r.modelo || (r.itens && r.itens.modelos && r.itens.modelos.modelo ? r.itens.modelos.modelo : '--')

  document.getElementById('modal-titulo').textContent = esc(codigo) + ' — ' + esc(modelo)
  document.getElementById('modal-sub').textContent = fdt(r.data_checklist) + (r.responsavel ? '  ·  ' + r.responsavel : '')

  var btnExc = document.getElementById('btn-excluir')
  if (btnExc) btnExc.style.display = (typeof PERFIL !== 'undefined' && PERFIL === 'Administrador') ? 'inline-flex' : 'none'

  var mfield = function(label, val, full) {
    var cls = 'mfield' + (full ? ' full' : '')
    return '<div class="' + cls + '"><label>' + label + '</label><div class="mval' + (!val ? ' empty' : '') + '">' + esc(String(val || '—')) + '</div></div>'
  }
  var mfieldPre = function(label, val) {
    return '<div class="mfield full"><label>' + label + '</label><div class="mval" style="white-space:pre-wrap">' + esc(val || '—') + '</div></div>'
  }
  var dotInfo = function(v) {
    if (!v) return {cls:'dot-na', vcls:'val-na', label:'N/A'}
    var s = v.toLowerCase()
    if (s==='incluso')     return {cls:'dot-ok',   vcls:'val-ok',   label:v}
    if (s==='danificado')  return {cls:'dot-warn',  vcls:'val-warn', label:v}
    if (s==='não incluso'||s==='nao incluso') return {cls:'dot-nok', vcls:'val-nok', label:v}
    return {cls:'dot-na', vcls:'val-na', label:v}
  }
  var acessItem = function(label, valor) {
    var d = dotInfo(valor)
    return '<div class="acess-item"><div class="dot ' + d.cls + '"></div><span class="alabel">' + esc(label) + '</span><span class="aval ' + d.vcls + '">' + esc(d.label) + '</span></div>'
  }

  var html = ''

  // Identificação
  html += '<div class="msec"><div class="msec-title">Identificação</div><div class="mgrid">'
  html += mfield('Data', fdt(r.data_checklist))
  html += mfield('Serial', r.serial)
  html += mfield('Modelo', modelo)
  html += mfield('Código Interno', codigo)
  html += mfield('Responsável', r.responsavel)
  html += mfield('Origem', r.origem)
  if (r.rma) html += mfield('RMA', r.rma)
  if (r.status_resultado) {
    var sbColors = {'Finalizada Inspeção':'#455A64;background:#ECEFF1','Em RMA / Assistência Técnica':'#6A1B9A;background:#F3E5F5','Estoque Usado':'#558B2F;background:#F1F8E9','Estoque Novo':'#2E7D32;background:#E8F5E9','Sucata':'#212121;background:#E0E0E0'}
    var sbStyle = sbColors[r.status_resultado] || '#455A64;background:#ECEFF1'
    var parts = sbStyle.split(';')
    html += '<div class="mfield"><label>Status Resultado</label><div class="mval"><span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:' + parts[0] + ';' + parts[1] + '">' + esc(r.status_resultado) + '</span></div></div>'
  }
  html += '</div></div>'

  // Observações
  if (r.observacoes) {
    html += '<div class="msec"><div class="msec-title">Observações / Defeito</div>'
    html += mfieldPre('Relato', r.observacoes)
    html += '</div>'
  }

  // Acessórios
  html += '<div class="msec"><div class="msec-title">Acessórios e Componentes</div>'
  html += '<div class="acess-grid">'
  html += acessItem('Weathershield',      r.weathershield)
  html += acessItem('Suporte de Montagem', r.suporte_montagem)
  html += acessItem('Base Traseira',      r.base_traseira)
  html += acessItem('Borracha de Vedação', r.borracha_vedacao)
  html += acessItem('Gasket Cable',       r.gasket_cable)
  html += '</div>'
  if (r.demais_acessorios) {
    html += '<div style="margin-top:10px">'
    html += mfieldPre('Demais Acessórios', r.demais_acessorios)
    html += '</div>'
  }
  html += '</div>'

  // Manutenções
  if (r.manutencoes && r.manutencoes.length) {
    html += '<div class="msec"><div class="msec-title">Manutenções Realizadas</div>'
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">'
    r.manutencoes.forEach(function(m) {
      html += '<span style="background:var(--acl);color:var(--ac);border:1px solid var(--acm);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500">' + esc(m) + '</span>'
    })
    html += '</div></div>'
  }

  // Fotos
  var fotos = [r.foto_1, r.foto_2, r.foto_3].filter(Boolean)
  if (fotos.length) {
    html += '<div class="msec"><div class="msec-title">Fotos</div>'
    html += '<div class="foto-grid">'
    fotos.forEach(function(u, i) {
      html += '<a href="' + u + '" target="_blank" onclick="event.preventDefault();event.stopPropagation();openLB(\"' + u + '\")"><img src="' + u + '" alt="Foto ' + (i+1) + '" loading="lazy"/></a>'
    })
    html += '</div></div>'
  }

  document.getElementById('modal-corpo').innerHTML = html
  document.getElementById('overlay').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('open')
  document.body.style.overflow = ''
}

var idAtualExcluir = null

function confirmarExclusao() {
  var r = todosRows.find(function(x){ return String(x.id) === String(idAtualExcluir) })
  if (!r) return
  var msg = 'Excluir o checklist de ' + (r.serial||'') + ' (' + fdt(r.data_checklist) + ')? Esta ação não pode ser desfeita.'
  if (!confirm(msg)) return
  executarExclusao()
}

async function executarExclusao() {
  if (!idAtualExcluir) return
  try {
    var r = await fetch(SURL + '/rest/v1/checklists_axis?id=eq.' + idAtualExcluir, {
      method: 'DELETE',
      headers: { ...hAuth(), 'Prefer': 'return=minimal' }
    })
    chk401(r)
    if (r.status === 403 || (r.status >= 400 && !r.ok)) {
      toast('Sem permissão para excluir.', 'err'); return
    }
    fecharModal()
    toast('Checklist excluído.', 'ok')
    await carregar()
  } catch(e) { toast('Erro: ' + e.message, 'err') }
}

var openLB = function(src) { document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('open') }
var closeLB = function() { document.getElementById('lb').classList.remove('open') }

function imprimirModal() {
  var id = idAtualExcluir
  var r = todosRows.find(function(x){ return String(x.id) === String(id) })
  if (!r) return

  var codigo = r.itens && r.itens.codigo_interno ? r.itens.codigo_interno : '--'
  var modelo = r.modelo || (r.itens && r.itens.modelos && r.itens.modelos.modelo ? r.itens.modelos.modelo : '--')
  var dt = r.data_checklist ? new Date(r.data_checklist + 'T12:00:00').toLocaleDateString('pt-BR') : '—'
  var mans = r.manutencoes && r.manutencoes.length ? r.manutencoes.join(', ') : '—'

  var field = function(lbl, val, full) {
    return '<div style="border:1px solid #ddd;border-radius:6px;overflow:hidden' + (full ? ';grid-column:1/-1' : '') + '">' +
      '<div style="background:#f0f3f8;padding:5px 10px;font-size:10px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.05em;-webkit-print-color-adjust:exact;print-color-adjust:exact">' + lbl + '</div>' +
      '<div style="padding:8px 10px;font-size:13px;color:#0f1224;min-height:28px">' + (val || '—') + '</div></div>'
  }

  var statusBadge = function(val) {
    if (!val) return '—'
    var colors = {'Finalizada Inspeção':'#455A64','Em RMA / Assistência Técnica':'#6A1B9A','Estoque Usado':'#558B2F','Estoque Novo':'#2E7D32','Sucata':'#212121'}
    var bg = colors[val] || '#455A64'
    return '<span style="background:'+bg+';color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact">'+val+'</span>'
  }

  var fields =
    field('1. Código Interno',   codigo) +
    field('2. Serial',            r.serial) +
    field('3. Modelo',            modelo) +
    field('4. Data',              dt) +
    field('5. Responsável',       r.responsavel) +
    field('6. Origem',            r.origem) +
    field('7. RMA',               r.rma || 'N/A') +
    field('8. Status Resultado',  statusBadge(r.status_resultado)) +
    field('9. Weathershield',     r.weathershield) +
    field('10. Suporte Montagem', r.suporte_montagem) +
    field('11. Base Traseira',    r.base_traseira) +
    field('12. Borracha Vedação', r.borracha_vedacao) +
    field('13. Gasket Cable',     r.gasket_cable) +
    field('14. Demais Acessórios', r.demais_acessorios || '—', true) +
    field('15. Manutenções Realizadas', mans, true) +
    (r.observacoes ? field('16. Observações', r.observacoes, true) : '')

  var fts = [r.foto_1, r.foto_2, r.foto_3].filter(Boolean)

  document.getElementById('chk-pr-sub').textContent =
    'Data: ' + dt + '  ·  Serial: ' + (r.serial||'—') + '  ·  Responsável: ' + (r.responsavel||'—')
  document.getElementById('chk-pr-fields').innerHTML = fields
  document.getElementById('chk-pr-resp').textContent = r.responsavel || '—'
  document.getElementById('chk-pr-rodape').innerHTML =
    'Axis Inventory · Checklist de Inspeção<br>Impresso em ' + new Date().toLocaleString('pt-BR')
  document.getElementById('chk-pr-fotos').innerHTML =
    fts.map(function(f){ return '<img src="'+f+'" style="width:180px;height:135px;object-fit:cover;border-radius:6px;border:1px solid #ddd"/>' }).join('')
  document.getElementById('chk-pr-fotos-sec').style.display = fts.length ? '' : 'none'

  gerarPDF('checklist-devolucao-' + (r.serial||'checklist') + '.pdf')
}

renderSidebar('checklists-inspecao')

function gerarPDF(nomeArquivo) {
  var elId = document.getElementById('chk-print-area') ? 'chk-print-area' : 'print-area'
  var el = document.getElementById(elId)
  if (!el) return

  // Mostrar elemento temporariamente para captura
  el.style.cssText = 'display:block!important;position:absolute;top:0;left:0;width:210mm;padding:14mm;box-sizing:border-box;background:#fff;z-index:-9999'

  var opt = {
    margin: 0,
    filename: nomeArquivo || 'checklist.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { 
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }

  html2pdf().set(opt).from(el).save().then(function() {
    el.style.cssText = 'display:none'
  }).catch(function(err) {
    console.error('PDF erro:', err)
    el.style.cssText = 'display:none'
  })
}
