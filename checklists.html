<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklists — Axis Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
.content{flex:1;padding:20px;max-width:1200px;margin:0 auto;width:100%}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:12px;color:var(--tx3);margin-top:3px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:300px;min-width:160px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.sinput{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:inherit;font-size:13px;color:var(--tx);outline:none;transition:border .15s}
.sinput:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}.sinput::placeholder{color:var(--tx3)}
.finput-date{padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:inherit;font-size:13px;color:var(--tx2);outline:none}
.finput-date:focus{border-color:var(--ac)}
.cbadge{font-size:12px;font-weight:600;color:var(--tx3);padding:3px 9px;border-radius:20px;background:var(--sur2);white-space:nowrap}
.btn{padding:7px 13px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sur);color:var(--tx2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:var(--sur2);color:var(--tx)}.btn-sm{padding:5px 9px;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.card:hover{box-shadow:var(--shl);border-color:var(--bd2);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-code{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ac)}
.card-date{font-size:12px;color:var(--tx3);white-space:nowrap}
.card-model{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px}
.card-serial{font-family:var(--mono);font-size:12px;color:var(--tx3)}
.card-resp{font-size:12px;color:var(--tx2);margin-top:8px;display:flex;align-items:center;gap:5px}
.mans{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.man{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--acl);color:var(--ac);border:1px solid var(--acm)}
.card-obs{font-size:12px;color:var(--tx3);margin-top:8px;font-style:italic;border-top:1px solid var(--bd);padding-top:8px}
.fotos{display:flex;gap:6px;margin-top:8px}
.foto{width:56px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--bd)}
.pag{display:flex;align-items:center;justify-content:space-between;padding:10px 0;flex-wrap:wrap;gap:6px;margin-top:12px}
.pag-info{font-size:12px;color:var(--tx3)}
.pag-ctrl{display:flex;gap:3px}
.pb{width:29px;height:29px;border-radius:7px;border:1px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;font-family:inherit}
.pb:hover:not(:disabled){background:var(--sur2)}.pb:disabled{opacity:.3;cursor:default}.pb.on{background:var(--ac);border-color:var(--ac);color:#fff}
.empty{text-align:center;padding:48px 20px;color:var(--tx3);grid-column:1/-1}
.empty-icon{font-size:28px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.sk-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px;height:160px;box-shadow:var(--sh)}
.sk{background:linear-gradient(90deg,var(--sur2) 25%,var(--bd) 50%,var(--sur2) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:4px;height:13px;display:inline-block}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;cursor:zoom-out}
.lb.open{display:flex}.lb img{max-width:92vw;max-height:88vh;border-radius:8px}
.lb-x{position:fixed;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tc{position:fixed;top:12px;right:12px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{padding:9px 14px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shl);animation:tin .2s ease;max-width:300px;border:1px solid}
@keyframes tin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:#F0FDF4;color:#16A34A;border-color:#BBF7D0}
.toast.err{background:#FEF2F2;color:#DC2626;border-color:#FECACA}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

tr:nth-child(even) td{background:rgba(27,42,74,.018)}
tr:hover td{background:rgba(46,107,230,.03)!important}
.stat-card{border-top:3px solid transparent!important;transition:all .2s!important}
.stat-card:hover{border-top-color:#2E6BE6!important;transform:translateY(-2px)!important}
.cli-bar-fill{background:linear-gradient(90deg,#2E6BE6,#3B82F6)!important}
.btn-p{background:#2E6BE6!important;border-color:#2E6BE6!important}
.btn-p:hover{background:#1D4ED8!important;border-color:#1D4ED8!important}
.pb.on{background:#2E6BE6!important;border-color:#2E6BE6!important}
.fsel:focus{border-color:#2E6BE6!important}
.sinput:focus{border-color:#2E6BE6!important;box-shadow:0 0 0 3px #EFF6FF!important}

</style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
<main class="content">
  <div id="app" style="display:none">
    <div class="page-head">
      <div>
        <div class="page-title">Checklists de inspeção</div>
        <div class="page-sub" id="page-sub">Histórico de todas as inspeções</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="sinput" id="q" type="search" placeholder="Código, serial, modelo, responsável..." oninput="onQ(this.value)"/>
      </div>
      <input type="date" class="finput-date" id="f-de" onchange="onF()" title="Data inicial"/>
      <input type="date" class="finput-date" id="f-ate" onchange="onF()" title="Data final"/>
      <button class="btn btn-sm" id="btn-clear" onclick="limparF()" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Limpar
      </button>
      <span class="cbadge" id="cbadge">—</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="pag">
      <span class="pag-info" id="pag-info">—</span>
      <div class="pag-ctrl" id="pag-ctrl"></div>
    </div>
  </div>
</main>
</div>
<div class="lb" id="lb" onclick="closeLB()"><button class="lb-x" onclick="closeLB()">✕</button><img id="lb-img" src="" alt=""/></div>
<div class="tc" id="tc"></div>
<script>
const POR_PAG=24
const fdt=iso=>{if(!iso)return"—";return new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"})}
let QS={busca:"",de:"",ate:"",pagina:0,total:0}
const buildQ=()=>{
  const from=QS.pagina*POR_PAG,to=from+POR_PAG-1
  let q="checklists_axis?select=*,itens!item_id(codigo_interno,modelo_id,modelos(modelo))"
  if(QS.de)q+=`&data_checklist=gte.${QS.de}`
  if(QS.ate)q+=`&data_checklist=lte.${QS.ate}`
  if(QS.busca){const b=encodeURIComponent(`%${QS.busca}%`);q+=`&or=(serial.ilike.${b},modelo.ilike.${b},responsavel.ilike.${b},origem.ilike.${b})`}
  q+=`&order=data_checklist.desc,criado_em.desc`
  return{q,range:`${from}-${to}`}
}
let loading=false
const carregar=async(reset=false)=>{
  if(loading)return;if(reset)QS.pagina=0;loading=true;renderSkel()
  try{
    const{q,range}=buildQ()
    const r=await fetch(`${SURL}/rest/v1/${q}`,{headers:{...hAuth(),"Prefer":"count=exact","Range":range,"Range-Unit":"items"}})
    chk401(r);if(!r.ok)throw new Error((await r.json())?.message||"Erro")
    const data=await r.json();const cr=r.headers.get("content-range")
    QS.total=cr?parseInt(cr.split("/")[1]):data.length
    renderGrid(data);renderPag()
    document.getElementById("page-sub").textContent=`${QS.total.toLocaleString("pt-BR")} checklists registrados`
    document.getElementById("cbadge").textContent=QS.total.toLocaleString("pt-BR")
    document.getElementById("pag-info").textContent=QS.total?`${QS.pagina*POR_PAG+1}–${Math.min((QS.pagina+1)*POR_PAG,QS.total)} de ${QS.total}`:"Nenhum resultado"
  }catch(e){document.getElementById("grid").innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-t">${esc(e.message)}</div></div>`;toast(e.message,"err")}
  finally{loading=false}
}
let qt=null
const onQ=v=>{clearTimeout(qt);qt=setTimeout(()=>{QS.busca=v.trim();QS.pagina=0;carregar()},280)}
const onF=()=>{QS.de=document.getElementById("f-de").value;QS.ate=document.getElementById("f-ate").value;QS.pagina=0;carregar();document.getElementById("btn-clear").style.display=(QS.de||QS.ate)?"":"none"}
const limparF=()=>{QS.de="";QS.ate="";QS.busca="";QS.pagina=0;document.getElementById("q").value="";document.getElementById("f-de").value="";document.getElementById("f-ate").value="";document.getElementById("btn-clear").style.display="none";carregar()}
const renderSkel=()=>{document.getElementById("grid").innerHTML=Array(6).fill(0).map(()=>`<div class="sk-card"><div class="sk" style="width:100px;margin-bottom:10px"></div><div class="sk" style="width:180px;height:18px;margin-bottom:8px"></div><div class="sk" style="width:130px"></div></div>`).join("")}
const renderGrid=rows=>{
  if(!rows.length){document.getElementById("grid").innerHTML=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-t">Nenhum checklist encontrado</div><div>Ajuste os filtros ou o período</div></div>`;return}
  document.getElementById("grid").innerHTML=rows.map(c=>{
    const codigo=c.itens?.codigo_interno||""
    const modelo=c.modelo||c.itens?.modelos?.modelo||"—"
    const mans=(c.manutencoes||[]).map(m=>`<span class="man">${esc(m)}</span>`).join("")
    const fotos=[c.foto_1,c.foto_2,c.foto_3].filter(Boolean).map(f=>`<img class="foto" src="${f}" onclick="event.stopPropagation();openLB('${f}')" alt=""/>`).join("")
    return`<div class="card" onclick="location.href='detalhe-item.html#${c.item_id}'">
      <div class="card-top">
        <div>
          <div class="card-code">${esc(codigo)}</div>
          <div class="card-model">${esc(modelo)}</div>
          <div class="card-serial">${esc(c.serial||"Sem serial")}</div>
        </div>
        <div class="card-date">${fdt(c.data_checklist)}</div>
      </div>
      ${mans?`<div class="mans">${mans}</div>`:""}
      <div class="card-resp">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${esc(c.responsavel||"—")}
        ${c.rma?`<span style="margin-left:8px;font-size:11px;padding:1px 6px;border-radius:10px;background:rgba(220,38,38,.1);color:#DC2626;font-weight:600">RMA: ${esc(c.rma)}</span>`:""}
      </div>
      ${c.observacoes?`<div class="card-obs">${esc(c.observacoes)}</div>`:""}
      ${fotos?`<div class="fotos">${fotos}</div>`:""}
    </div>`
  }).join("")
}
const renderPag=()=>{
  const total=Math.ceil(QS.total/POR_PAG);if(total<=1){document.getElementById("pag-ctrl").innerHTML="";return}
  const p=[];p.push(`<button class="pb" onclick="irP(${QS.pagina-1})" ${QS.pagina===0?"disabled":""}>‹</button>`)
  for(let i=0;i<total;i++){if(i===0||i===total-1||Math.abs(i-QS.pagina)<=2)p.push(`<button class="pb ${i===QS.pagina?"on":""}" onclick="irP(${i})">${i+1}</button>`);else if(Math.abs(i-QS.pagina)===3)p.push(`<span style="color:var(--tx3);font-size:11px;padding:0 2px">…</span>`)}
  p.push(`<button class="pb" onclick="irP(${QS.pagina+1})" ${QS.pagina>=total-1?"disabled":""}>›</button>`)
  document.getElementById("pag-ctrl").innerHTML=p.join("")
}
window.irP=p=>{const t=Math.ceil(QS.total/POR_PAG);if(p<0||p>=t)return;QS.pagina=p;carregar()}
const openLB=src=>{document.getElementById("lb-img").src=src;document.getElementById("lb").classList.add("open")}
const closeLB=()=>document.getElementById("lb").classList.remove("open")

// Chamado pelo auth.js após autenticação
async function onPostLogin() {
  renderSidebar('checklists')
  await carregar(true)
}

renderSidebar('checklists')
initAuth()
</script>
</body>
</html>
