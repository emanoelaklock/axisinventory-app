<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklists de Inspeção — Axis Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<style>
.content{flex:1;padding:20px;max-width:1300px;margin:0 auto;width:100%}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:12px;color:var(--tx3);margin-top:3px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:300px;min-width:160px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.sinput{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:inherit;font-size:13px;color:var(--tx);outline:none;transition:border .15s}
.sinput:focus{border-color:#2E6BE6;box-shadow:0 0 0 3px #EFF6FF}.sinput::placeholder{color:var(--tx3)}
.finput-date{padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:inherit;font-size:13px;color:var(--tx2);outline:none;transition:border .15s}
.finput-date:focus{border-color:#2E6BE6}
.cbadge{font-size:12px;font-weight:600;color:var(--tx3);padding:3px 9px;border-radius:20px;background:var(--sur2);white-space:nowrap}
.btn{padding:7px 13px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sur);color:var(--tx2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:var(--sur2);color:var(--tx)}.btn-sm{padding:5px 9px;font-size:12px}
.btn-p{background:#2E6BE6;border-color:#2E6BE6;color:#fff}.btn-p:hover{background:#1D4ED8;border-color:#1D4ED8;color:#fff}
.tcard{background:var(--sur);border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--sur2)}
th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--bd);color:var(--tx2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(27,42,74,.018)}
tr:hover td{background:rgba(46,107,230,.03)!important}
.mono{font-family:var(--mono);font-size:12px;color:var(--tx)}
.dim{color:var(--tx3);font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.man-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:var(--acl);color:var(--ac);border:1px solid var(--acm);white-space:nowrap}
.pag{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:6px}
.pag-info{font-size:12px;color:var(--tx3)}
.pag-ctrl{display:flex;gap:3px}
.pb{width:29px;height:29px;border-radius:7px;border:1px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;font-family:inherit}
.pb:hover:not(:disabled){background:var(--sur2)}.pb:disabled{opacity:.3;cursor:default}.pb.on{background:#2E6BE6;border-color:#2E6BE6;color:#fff}
.empty{text-align:center;padding:48px 20px;color:var(--tx3)}
.empty-icon{font-size:28px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.sk{background:linear-gradient(90deg,var(--sur2) 25%,var(--bd) 50%,var(--sur2) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:4px;height:13px;display:inline-block}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Lightbox fotos */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;cursor:zoom-out}
.lb.open{display:flex}.lb img{max-width:92vw;max-height:88vh;border-radius:8px}
.lb-x{position:fixed;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* Modal detalhe inspeção */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,20,50,.52);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--sur);border-radius:16px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.28);display:flex;flex-direction:column;animation:mup .2s ease}
@keyframes mup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{background:linear-gradient(135deg,#1B2A4A 0%,#2E6BE6 100%);padding:18px 22px;display:flex;align-items:flex-start;justify-content:space-between;border-radius:16px 16px 0 0;position:sticky;top:0}
.modal-hd h2{margin:0;font-size:15px;font-weight:700;color:#fff}
.modal-hd .sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.modal-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.32)}
.modal-bd{padding:20px 22px;flex:1}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;padding:12px 22px 16px;border-top:1px solid var(--bd)}
.msec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#2E6BE6;padding-bottom:6px;border-bottom:2px solid #EFF6FF;margin:16px 0 12px}
.msec:first-child{margin-top:0}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
.mf label{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.mf span{font-size:13px;color:var(--tx)}.mf em{color:var(--tx3);font-style:normal}
.mf.full{grid-column:1/-1}
.mfoto-grid{display:flex;gap:8px;flex-wrap:wrap}
.mfoto-grid a{border-radius:9px;overflow:hidden;border:2px solid var(--bd);transition:border-color .15s;display:block}
.mfoto-grid a:hover{border-color:#2E6BE6}
.mfoto-grid img{width:110px;height:82px;object-fit:cover;display:block}
.mans-wrap{display:flex;flex-wrap:wrap;gap:5px}
@media(max-width:500px){.mgrid{grid-template-columns:1fr}}
@media print{
  body > *{display:none!important}
  #chk-print-area{display:block!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
@page{size:A4 portrait;margin:6mm 8mm}
.btn-del{background:rgba(220,38,38,.08);color:#DC2626;border-color:rgba(220,38,38,.2)}.btn-del:hover{background:#DC2626;color:#fff;border-color:#DC2626}
.tc{position:fixed;top:12px;right:12px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{padding:9px 14px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shl);animation:tin .2s ease;max-width:300px;border:1px solid}
@keyframes tin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:#F0FDF4;color:#16A34A;border-color:#BBF7D0}
.toast.err{background:#FEF2F2;color:#DC2626;border-color:#FECACA}
.toast.info{background:var(--acl);color:var(--ac);border-color:var(--acm)}

/* Print A4 Inspeção */
#chk-print-area{display:none;font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#111;background:#fff;width:195mm;box-sizing:border-box}
#chk-pr-header{display:flex;align-items:center;gap:12px;border-bottom:3px solid #202A44;padding-bottom:8px;margin-bottom:10px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#chk-pr-logo{width:40px;height:40px;background:#202A44;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#chk-pr-title{font-size:16px;font-weight:800;color:#202A44;line-height:1.2}
#chk-pr-sub{font-size:10px;color:#555;margin-top:3px}
#chk-pr-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:5px;width:100%}
.chk-pr-cell{border:1px solid #bbb;border-radius:4px;overflow:hidden;width:100%;box-sizing:border-box}
.chk-pr-cell.full{grid-column:1/-1}
.chk-pr-lbl{background:#dde4f0;padding:4px 8px;font-size:8px;font-weight:800;color:#202A44;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #bbb;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.chk-pr-val{padding:5px 8px;font-size:10px;color:#111;min-height:22px;word-break:break-word;line-height:1.4}
.chk-pr-tag{background:#dde4f0;color:#202A44;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;display:inline-block;margin:1px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#chk-pr-fotos-sec{margin-bottom:8px}
.chk-pr-sec-lbl{font-size:9px;font-weight:800;color:#202A44;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
#chk-pr-fotos{display:flex;gap:8px;flex-wrap:wrap}
#chk-pr-fotos img{width:150px;height:112px;object-fit:cover;border-radius:5px;border:1px solid #bbb}
#chk-pr-footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1.5px solid #bbb;padding-top:8px;margin-top:6px}
#chk-pr-assin{text-align:center}
#chk-pr-assin-linha{width:200px;border-top:1px solid #333;margin:32px auto 4px}
#chk-pr-resp{font-size:9px;color:#555}
#chk-pr-rodape{font-size:8px;color:#999;text-align:right;line-height:1.6}
</style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="sb-main"><div class="page">
<main class="content">
  <div id="app" style="display:none">
    <div class="page-head">
      <div>
        <div class="page-title">Checklists de Inspeção</div>
        <div class="page-sub" id="page-sub">Carregando...</div>
      </div>
      <button class="btn" style="background:#1B2A4A;border-color:#1B2A4A;color:#fff;font-weight:600" onmouseover="this.style.background='#2E6BE6';this.style.borderColor='#2E6BE6'" onmouseout="this.style.background='#1B2A4A';this.style.borderColor='#1B2A4A'" onclick="window.open('checklist-axis.html','_blank')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Checklist
      </button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="sinput" id="q" type="search" placeholder="Código, serial, modelo, responsável..." oninput="onQ(this.value)"/>
      </div>
      <input type="date" class="finput-date" id="f-de" onchange="onF()" title="Data inicial"/>
      <input type="date" class="finput-date" id="f-ate" onchange="onF()" title="Data final"/>
      <button class="btn btn-sm" id="btn-clear" onclick="limparF()" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Limpar
      </button>
      <span class="cbadge" id="cbadge">--</span>
    </div>

    <div class="tcard">
      <div class="twrap">
        <table>
          <thead><tr>
            <th>Data</th>
            <th>Código</th>
            <th>Modelo</th>
            <th>Serial</th>
            <th>Responsável</th>
            <th>Manutenções</th>
            <th></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pag" id="pag" style="display:none">
        <span class="pag-info" id="pag-info">--</span>
        <div class="pag-ctrl" id="pag-ctrl"></div>
      </div>
    </div>
  </div>
</main>
</div></div>

<!-- Lightbox fotos -->
<div class="lb" id="lb" onclick="closeLB()">
  <button class="lb-x" onclick="closeLB()">✕</button>
  <img id="lb-img" src="" alt=""/>
</div>

<!-- Modal detalhe inspeção -->
<div class="overlay" id="overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <h2 id="modal-titulo">Checklist de Inspeção</h2>
        <div class="sub" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal()" title="Fechar">×</button>
    </div>
    <div class="modal-bd" id="modal-corpo"></div>
    <div class="modal-ft">
      <button class="btn btn-sm btn-del" id="btn-excluir" onclick="confirmarExclusao()" style="display:none;margin-right:auto">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Excluir
      </button>
      <button class="btn btn-sm" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-sm btn-p" onclick="imprimirModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
const POR_PAG = 25
var QS = { busca:'', de:'', ate:'', pagina:0, total:0 }
var todosRows = []
var rowsFiltrados = []

// -- CARREGAR ----------------------------------------------------------
async function carregar() {
  renderSkel()
  try {
    var r = await fetch(
      SURL + '/rest/v1/checklists_axis?select=*,itens!item_id(codigo_interno,modelo_id,modelos(modelo))&order=data_checklist.desc,criado_em.desc',
      { headers: hAuth() }
    )
    chk401(r)
    if (!r.ok) throw new Error((await r.json()).message || 'Erro ao carregar')
    todosRows = await r.json()
    aplicarFiltros()
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-t">' + esc(e.message) + '</div></div></td></tr>'
    toast(e.message, 'err')
  }
}

// -- FILTROS -----------------------------------------------------------
function aplicarFiltros() {
  var q = QS.busca.toLowerCase()
  rowsFiltrados = todosRows.filter(function(r) {
    var codigo = r.itens && r.itens.codigo_interno ? r.itens.codigo_interno : ''
    var modelo = r.modelo || (r.itens && r.itens.modelos && r.itens.modelos.modelo ? r.itens.modelos.modelo : '')
    var mQ = !q || [codigo, modelo, r.serial, r.responsavel, r.origem].some(function(v){ return v && v.toLowerCase().includes(q) })
    var mDe  = !QS.de  || (r.data_checklist || '') >= QS.de
    var mAte = !QS.ate || (r.data_checklist || '') <= QS.ate
    return mQ && mDe && mAte
  })
  QS.pagina = 0
  QS.total  = rowsFiltrados.length
  var n = QS.total
  document.getElementById('page-sub').textContent = n.toLocaleString('pt-BR') + ' checklist' + (n !== 1 ? 's' : '') + ' registrado' + (n !== 1 ? 's' : '')
  document.getElementById('cbadge').textContent = n.toLocaleString('pt-BR')
  renderTabela()
  renderPag()
}

var qt = null
var onQ = function(v) { clearTimeout(qt); qt = setTimeout(function(){ QS.busca = v.trim(); aplicarFiltros() }, 250) }

var onF = function() {
  QS.de  = document.getElementById('f-de').value
  QS.ate = document.getElementById('f-ate').value
  document.getElementById('btn-clear').style.display = (QS.de || QS.ate) ? '' : 'none'
  aplicarFiltros()
}

var limparF = function() {
  QS.de = ''; QS.ate = ''; QS.busca = ''
  document.getElementById('q').value = ''
  document.getElementById('f-de').value = ''
  document.getElementById('f-ate').value = ''
  document.getElementById('btn-clear').style.display = 'none'
  aplicarFiltros()
}

// -- RENDERIZAR TABELA -------------------------------------------------
var fdt = function(iso) {
  if (!iso) return '--'
  return new Date(iso + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'})
}

var renderSkel = function() {
  var rows = ''
  for (var i = 0; i < 8; i++) {
    rows += '<tr>'
    for (var j = 0; j < 7; j++) rows += '<td><span class="sk" style="width:' + (40 + Math.round(Math.random()*60)) + 'px"></span></td>'
    rows += '</tr>'
  }
  document.getElementById('tbody').innerHTML = rows
}

var renderTabela = function() {
  var ini = QS.pagina * POR_PAG
  var pag = rowsFiltrados.slice(ini, ini + POR_PAG)

  if (!pag.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-icon">&#x2705;</div><div class="empty-t">Nenhum checklist encontrado</div><div>Ajuste os filtros</div></div></td></tr>'
    document.getElementById('pag').style.display = 'none'
    return
  }

  var rows = ''
  for (var i = 0; i < pag.length; i++) {
    var c = pag[i]
    var codigo = c.itens && c.itens.codigo_interno ? c.itens.codigo_interno : '--'
    var modelo = c.modelo || (c.itens && c.itens.modelos && c.itens.modelos.modelo ? c.itens.modelos.modelo : '--')
    var mans = (c.manutencoes || []).slice(0, 3).map(function(m){ return '<span class="man-tag">' + esc(m) + '</span>' }).join(' ')
    if (c.manutencoes && c.manutencoes.length > 3) mans += ' <span class="dim">+' + (c.manutencoes.length - 3) + '</span>'
    var rmaTag = c.rma ? '<span style="margin-left:6px;font-size:11px;padding:1px 6px;border-radius:10px;background:rgba(220,38,38,.1);color:#DC2626;font-weight:600">RMA</span>' : ''
    rows += '<tr style="cursor:pointer" onclick="abrirModal(\'' + c.id + '\')">'
    rows += '<td class="dim" style="white-space:nowrap">' + fdt(c.data_checklist) + '</td>'
    rows += '<td><span class="mono">' + esc(codigo) + '</span></td>'
    rows += '<td style="font-weight:500;color:var(--tx)">' + esc(modelo) + '</td>'
    rows += '<td><span class="mono">' + esc(c.serial || '--') + '</span></td>'
    rows += '<td class="dim">' + esc(c.responsavel || '--') + rmaTag + '</td>'
    rows += '<td>' + (mans || '<span class="dim">--</span>') + '</td>'
    rows += '<td><button class="btn btn-sm btn-p" onclick="event.stopPropagation();abrirModal(\'' + c.id + '\')">'
    rows += '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Ver</button></td>'
    rows += '</tr>'
  }
  document.getElementById('tbody').innerHTML = rows

  var end = Math.min(ini + POR_PAG, QS.total)
  document.getElementById('pag-info').textContent = (ini + 1) + '-' + end + ' de ' + QS.total
  document.getElementById('pag').style.display = 'flex'
}

// -- PAGINAÇÃO ---------------------------------------------------------
var renderPag = function() {
  var total = Math.ceil(QS.total / POR_PAG)
  if (total <= 1) { document.getElementById('pag-ctrl').innerHTML = ''; return }
  var p = ''
  p += '<button class="pb" onclick="irP(' + (QS.pagina - 1) + ')" ' + (QS.pagina === 0 ? 'disabled' : '') + '>&lsaquo;</button>'
  for (var i = 0; i < total; i++) {
    if (i === 0 || i === total - 1 || Math.abs(i - QS.pagina) <= 2)
      p += '<button class="pb ' + (i === QS.pagina ? 'on' : '') + '" onclick="irP(' + i + ')">' + (i + 1) + '</button>'
    else if (Math.abs(i - QS.pagina) === 3)
      p += '<span style="color:var(--tx3);font-size:11px;padding:0 2px">...</span>'
  }
  p += '<button class="pb" onclick="irP(' + (QS.pagina + 1) + ')" ' + (QS.pagina >= total - 1 ? 'disabled' : '') + '>&rsaquo;</button>'
  document.getElementById('pag-ctrl').innerHTML = p
}

window.irP = function(p) {
  var t = Math.ceil(QS.total / POR_PAG)
  if (p < 0 || p >= t) return
  QS.pagina = p
  renderTabela(); renderPag()
  window.scrollTo({top: 0, behavior: 'smooth'})
}

// -- MODAL DETALHE -----------------------------------------------------
function abrirModal(id) {
  idAtualExcluir = id
  var r = todosRows.find(function(x){ return String(x.id) === String(id) })
  if (!r) return

  var codigo = r.itens && r.itens.codigo_interno ? r.itens.codigo_interno : '--'
  var modelo = r.modelo || (r.itens && r.itens.modelos && r.itens.modelos.modelo ? r.itens.modelos.modelo : '--')

  document.getElementById('modal-titulo').textContent = esc(codigo) + ' - ' + esc(modelo)
  document.getElementById('modal-sub').textContent = fdt(r.data_checklist) + (r.responsavel ? '  -  ' + r.responsavel : '')

  var mf = function(lbl, val) {
    return '<div class="mf"><label>' + lbl + '</label><span>' + (val ? esc(String(val)) : '<em>--</em>') + '</span></div>'
  }

  var html = ''

  // Identificação
  html += '<div class="msec">Identificação</div>'
  html += '<div class="mgrid">'
  html += mf('Data', fdt(r.data_checklist))
  html += mf('Serial', r.serial)
  html += mf('Modelo', modelo)
  html += mf('Código Interno', codigo)
  html += mf('Responsável', r.responsavel)
  html += mf('Origem', r.origem)
  if (r.rma) html += mf('RMA', r.rma)
  html += '</div>'

  // Manutenções
  if (r.manutencoes && r.manutencoes.length) {
    html += '<div class="msec">Manutenções Realizadas</div>'
    html += '<div class="mf full"><div class="mans-wrap">'
    r.manutencoes.forEach(function(m){ html += '<span class="man-tag">' + esc(m) + '</span> ' })
    html += '</div></div>'
  }

  // Observações
  if (r.observacoes) {
    html += '<div class="msec">Observações</div>'
    html += '<div class="mf full"><span style="white-space:pre-wrap">' + esc(r.observacoes) + '</span></div>'
  }

  // Fotos
  var fotos = [r.foto_1, r.foto_2, r.foto_3].filter(Boolean)
  if (fotos.length) {
    html += '<div class="msec">Fotos</div>'
    html += '<div class="mfoto-grid">'
    fotos.forEach(function(u, i) {
      html += '<a href="' + u + '" target="_blank" rel="noopener" onclick="event.preventDefault();event.stopPropagation();openLB(\'' + u + '\')">'
      html += '<img src="' + u + '" alt="Foto ' + (i + 1) + '" loading="lazy"/></a>'
    })
    html += '</div>'
  }

  document.getElementById('modal-corpo').innerHTML = html
  document.getElementById('overlay').classList.add('open')
  document.body.style.overflow = 'hidden'
  // Mostrar botão Excluir só para Administrador
  var btnExc = document.getElementById('btn-excluir')
  if (btnExc) btnExc.style.display = (typeof PERFIL !== 'undefined' && PERFIL === 'Administrador') ? 'inline-flex' : 'none'
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('open')
  document.body.style.overflow = ''
}

var idAtualExcluir = null

function confirmarExclusao() {
  var r = todosRows.find(function(x){ return String(x.id) === String(idAtualExcluir) })
  if (!r) return
  var msg = 'Excluir o checklist de ' + (r.serial||'') + ' (' + fdt(r.data_checklist) + ')? Esta ação não pode ser desfeita.'
  if (!confirm(msg)) return
  executarExclusao()
}

async function executarExclusao() {
  if (!idAtualExcluir) return
  try {
    var r = await fetch(SURL + '/rest/v1/checklists_axis?id=eq.' + idAtualExcluir, {
      method: 'DELETE',
      headers: { ...hAuth(), 'Prefer': 'return=minimal' }
    })
    chk401(r)
    if (r.status === 403 || (r.status >= 400 && !r.ok)) {
      toast('Sem permissão para excluir.', 'err'); return
    }
    fecharModal()
    toast('Checklist excluído.', 'ok')
    await carregar()
  } catch(e) { toast('Erro: ' + e.message, 'err') }
}

var openLB = function(src) { document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('open') }
var closeLB = function() { document.getElementById('lb').classList.remove('open') }

// -- AUTH CALLBACK -----------------------------------------------------
async function onPostLogin() {
  renderSidebar('checklists-inspecao')
  await carregar()
}

function imprimirModal() {
  var id = idAtualExcluir
  var r = todosRows.find(function(x){ return String(x.id) === String(id) })
  if (!r) return

  var codigo = r.itens && r.itens.codigo_interno ? r.itens.codigo_interno : '--'
  var modelo = r.modelo || (r.itens && r.itens.modelos && r.itens.modelos.modelo ? r.itens.modelos.modelo : '--')

  var cell = function(lbl, val, full) {
    return '<div class="chk-pr-cell' + (full ? ' full' : '') + '">' +
      '<div class="chk-pr-lbl">' + lbl + '</div>' +
      '<div class="chk-pr-val">' + (val ? String(val) : '—') + '</div></div>'
  }
  var tags = function(arr) {
    if (!arr || !arr.length) return '—'
    return arr.map(function(m){ return '<span class="chk-pr-tag">'+m+'</span>' }).join(' ')
  }

  var fields =
    cell('Código Interno',   codigo) +
    cell('Serial',           r.serial) +
    cell('Modelo',           modelo) +
    cell('Data',             fdt(r.data_checklist)) +
    cell('Responsável',      r.responsavel) +
    cell('Origem',           r.origem) +
    cell('RMA',              r.rma || 'N/A') +
    cell('Status Resultado', r.status_resultado || '—') +
    cell('Weathershield',    r.weathershield) +
    cell('Suporte Montagem', r.suporte_montagem) +
    cell('Base Traseira',    r.base_traseira) +
    cell('Borracha Vedação', r.borracha_vedacao) +
    cell('Gasket Cable',     r.gasket_cable) +
    cell('Demais Acessórios',r.demais_acessorios || '—', true) +
    '<div class="chk-pr-cell full"><div class="chk-pr-lbl">Manutenções Realizadas</div>' +
    '<div class="chk-pr-val">' + tags(r.manutencoes) + '</div></div>' +
    (r.observacoes ? cell('Observações', r.observacoes, true) : '')

  var fotos = [r.foto_1, r.foto_2, r.foto_3].filter(Boolean)

  document.getElementById('chk-pr-sub').textContent =
    'Código: ' + codigo + '  ·  Serial: ' + (r.serial||'—') +
    '  ·  Data: ' + fdt(r.data_checklist) + '  ·  Responsável: ' + (r.responsavel||'—')
  document.getElementById('chk-pr-fields').innerHTML = fields
  document.getElementById('chk-pr-resp').textContent = r.responsavel||'—'
  document.getElementById('chk-pr-rodape').innerHTML =
    'Axis Inventory · Checklist de Inspeção<br>Impresso em ' + new Date().toLocaleString('pt-BR')
  document.getElementById('chk-pr-fotos').innerHTML =
    fotos.map(function(f){ return '<img src="'+f+'">' }).join('')
  document.getElementById('chk-pr-fotos-sec').style.display = fotos.length ? '' : 'none'

  window.print()
}

renderSidebar('checklists-inspecao')
initAuth()
