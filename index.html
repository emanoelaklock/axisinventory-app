<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventário Axis Traders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; font-size:14px; background:#f8f9fa; color:#111827; min-height:100vh; }

  /* LOGIN */
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#f0f4ff 0%,#e8f0fe 100%); }
  .login-box { background:#fff; border-radius:16px; padding:40px; width:400px; box-shadow:0 8px 40px rgba(0,0,0,.1); }
  .login-logo { font-size:22px; font-weight:700; color:#111; margin-bottom:4px; }
  .login-logo span { color:#2563eb; }
  .login-sub { font-size:13px; color:#6b7280; margin-bottom:32px; }
  .login-label { font-size:12px; font-weight:500; color:#374151; margin-bottom:6px; display:block; }
  .login-input { width:100%; border:1.5px solid #e5e7eb; background:#f9fafb; color:#111; font-family:'Inter',sans-serif; font-size:14px; padding:10px 14px; border-radius:8px; outline:none; margin-bottom:16px; }
  .login-input:focus { border-color:#2563eb; background:#fff; }
  .login-btn { width:100%; background:#2563eb; color:#fff; font-family:'Inter',sans-serif; font-weight:600; font-size:14px; padding:12px; border-radius:8px; border:none; cursor:pointer; }
  .login-btn:hover { background:#1d4ed8; }
  .login-btn:disabled { background:#93c5fd; cursor:default; }
  .login-error { font-size:12px; color:#ef4444; margin-top:10px; text-align:center; }

  /* APP */
  #app-screen { display:none; flex-direction:column; min-height:100vh; }

  /* HEADER */
  .header { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 24px; display:flex; align-items:center; gap:20px; height:60px; position:sticky; top:0; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .logo { font-size:17px; font-weight:700; color:#111; white-space:nowrap; }
  .logo span { color:#2563eb; }
  .header-tabs { display:flex; gap:4px; flex:1; }
  .tab-btn { padding:6px 16px; border-radius:8px; border:none; background:transparent; color:#6b7280; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .tab-btn:hover { background:#f3f4f6; color:#111; }
  .tab-btn.active { background:#eff6ff; color:#2563eb; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .user-email { font-size:12px; color:#6b7280; }
  .logout-btn { padding:6px 12px; border-radius:7px; border:1.5px solid #e5e7eb; background:transparent; color:#6b7280; font-family:'Inter',sans-serif; font-size:12px; cursor:pointer; font-weight:500; }
  .logout-btn:hover { border-color:#ef4444; color:#ef4444; }

  /* MAIN */
  .main-content { flex:1; padding:24px; max-width:1400px; margin:0 auto; width:100%; }

  /* KPI */
  .kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:24px; }
  .kpi-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:18px 20px; display:flex; align-items:center; gap:14px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .kpi-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .kpi-value { font-size:26px; font-weight:700; line-height:1; }
  .kpi-label { font-size:12px; color:#6b7280; margin-top:3px; font-weight:500; }

  /* TOOLBAR */
  .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .search-box { flex:1; display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid #e5e7eb; border-radius:9px; padding:8px 14px; min-width:200px; max-width:400px; }
  .search-box:focus-within { border-color:#2563eb; }
  .search-box input { border:none; outline:none; font-family:'Inter',sans-serif; font-size:13px; color:#111; background:transparent; width:100%; }
  .search-box input::placeholder { color:#9ca3af; }
  .filter-select { background:#fff; border:1.5px solid #e5e7eb; color:#374151; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; padding:8px 12px; border-radius:9px; outline:none; cursor:pointer; }
  .filter-select:focus { border-color:#2563eb; }
  .add-btn { background:#2563eb; color:#fff; border:none; border-radius:9px; padding:9px 18px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; margin-left:auto; }
  .add-btn:hover { background:#1d4ed8; }

  /* TABLE */
  .table-wrap { background:#fff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#f9fafb; border-bottom:1.5px solid #e5e7eb; }
  th { padding:11px 14px; text-align:left; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
  tbody tr { border-bottom:1px solid #f3f4f6; transition:background .1s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:#f8faff; }
  td { padding:11px 14px; font-size:13px; color:#374151; }
  .td-serial { font-weight:600; color:#111; }
  .td-modelo { color:#111; font-weight:500; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .td-tipo,.td-pn { color:#6b7280; font-size:12px; }
  .td-cliente { max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .td-nf { color:#6b7280; font-size:12px; font-family:monospace; }
  .actions-cell { display:flex; gap:5px; align-items:center; }
  .action-btn { width:28px; height:28px; border-radius:6px; border:1.5px solid #e5e7eb; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all .15s; }
  .action-btn:hover { border-color:#2563eb; background:#eff6ff; }
  .action-btn.del:hover { border-color:#ef4444; background:#fef2f2; }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
  .badge-locado { background:#dbeafe; color:#1d4ed8; }
  .badge-vendido { background:#dcfce7; color:#15803d; }
  .badge-estoque { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
  .badge-reservado { background:#f3e8ff; color:#7e22ce; }
  .badge-sucata { background:#fee2e2; color:#dc2626; }
  .badge-rma { background:#fff7ed; color:#c2410c; }
  .badge-outro { background:#f3f4f6; color:#6b7280; }

  /* PAGINATION */
  .pagination { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-top:1px solid #f3f4f6; font-size:13px; color:#6b7280; }
  .page-btns { display:flex; gap:4px; }
  .page-btn { padding:5px 12px; border-radius:7px; border:1.5px solid #e5e7eb; background:#fff; color:#374151; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; }
  .page-btn:hover:not(:disabled) { border-color:#2563eb; color:#2563eb; }
  .page-btn:disabled { opacity:.4; cursor:default; }

  /* LOADING */
  .loading-row td { text-align:center; padding:60px; color:#9ca3af; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid #e5e7eb; border-top-color:#2563eb; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* MODALS */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .modal-overlay.open { display:flex; }
  .close-btn { width:32px; height:32px; border-radius:8px; border:1.5px solid #e5e7eb; background:#fff; cursor:pointer; font-size:16px; color:#6b7280; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .close-btn:hover { border-color:#ef4444; color:#ef4444; }

  /* DETAIL */
  .detail-modal { background:#fff; border-radius:16px; width:540px; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-header { padding:24px 24px 16px; border-bottom:1px solid #f3f4f6; display:flex; justify-content:space-between; align-items:flex-start; }
  .modal-title { font-size:17px; font-weight:700; color:#111; }
  .modal-sub { font-size:13px; color:#6b7280; margin-top:5px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .modal-body { padding:20px 24px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .detail-field label { font-size:11px; font-weight:600; color:#9ca3af; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:4px; }
  .detail-field span { font-size:13px; color:#111; font-weight:500; }
  .modal-footer { padding:16px 24px 24px; display:flex; gap:10px; border-top:1px solid #f3f4f6; }
  .btn-primary { flex:1; background:#2563eb; color:#fff; border:none; border-radius:9px; padding:10px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:#1d4ed8; }
  .btn-secondary { flex:1; background:#fff; color:#374151; border:1.5px solid #e5e7eb; border-radius:9px; padding:10px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; }
  .btn-secondary:hover { border-color:#374151; }
  .btn-danger { background:#fff; color:#ef4444; border:1.5px solid #fecaca; border-radius:9px; padding:10px 16px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; }
  .btn-danger:hover { background:#fef2f2; border-color:#ef4444; }

  /* EDIT */
  .edit-modal { background:#fff; border-radius:16px; width:600px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .form-row.full { grid-template-columns:1fr; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-label { font-size:12px; font-weight:600; color:#374151; }
  .form-input,.form-select,.form-textarea { border:1.5px solid #e5e7eb; background:#f9fafb; color:#111; font-family:'Inter',sans-serif; font-size:13px; padding:9px 12px; border-radius:8px; outline:none; }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:#2563eb; background:#fff; }
  .form-textarea { resize:vertical; min-height:80px; }
  .pn-wrap { position:relative; }
  .pn-status { position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:12px; color:#16a34a; font-weight:600; }
  .pn-suggestions { position:absolute; top:100%; left:0; right:0; background:#fff; border:1.5px solid #e5e7eb; border-radius:8px; margin-top:4px; display:none; max-height:180px; overflow-y:auto; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,.12); }
  .pn-item { padding:10px 14px; cursor:pointer; font-size:12px; border-bottom:1px solid #f3f4f6; }
  .pn-item:hover { background:#f0f7ff; }
  .pn-item:last-child { border-bottom:none; }
  .pn-code { color:#2563eb; font-weight:600; font-family:monospace; }
  .pn-name { color:#6b7280; margin-left:8px; }

  /* DASHBOARD */
  .dash-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
  .chart-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .chart-title { font-size:14px; font-weight:600; color:#111; margin-bottom:16px; }
  .bar-item { margin-bottom:13px; }
  .bar-top { display:flex; justify-content:space-between; margin-bottom:5px; }
  .bar-track { background:#f3f4f6; border-radius:4px; height:7px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; }
  .client-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f3f4f6; }
  .client-row:last-child { border-bottom:none; }
  .client-cnt { font-size:12px; font-weight:600; color:#2563eb; background:#eff6ff; padding:2px 8px; border-radius:6px; }

  /* ALERTS */
  .alert-card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:border-color .15s; }
  .alert-card:hover { border-color:#fca5a5; }
  .alert-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .alert-serial { font-size:14px; font-weight:700; color:#111; }
  .alert-tag { background:#fee2e2; color:#dc2626; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:600; }

  #view-inventory { display:block; }
  #view-dashboard,#view-alerts { display:none; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:#f3f4f6; }
  ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }
</style>
</head>
<body>

<div id="login-screen" style="display:flex;">
  <div class="login-box">
    <div class="login-logo">Inventário <span>Axis Traders</span></div>
    <div class="login-sub">Gestão de equipamentos Axis Communications</div>
    <label class="login-label">E-mail</label>
    <input class="login-input" id="login-email" type="email" placeholder="seu@email.com">
    <label class="login-label">Senha</label>
    <input class="login-input" id="login-password" type="password" placeholder="••••••••">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <div class="header">
    <div class="logo">Inventário <span>Axis Traders</span></div>
    <div class="header-tabs">
      <button class="tab-btn active" onclick="switchView('inventory')">◫ Inventário</button>
      <button class="tab-btn" onclick="switchView('dashboard')">⊞ Dashboard</button>
      <button class="tab-btn" id="alerts-tab-btn" onclick="switchView('alerts')">△ Alertas (0)</button>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-name-display"></span>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main-content">
    <div id="view-inventory">
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-icon" style="background:#eff6ff;">📦</div><div><div class="kpi-value" id="kpi-total" style="color:#2563eb;">—</div><div class="kpi-label">Total</div></div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:#f0fdf4;">🗄️</div><div><div class="kpi-value" id="kpi-estoque" style="color:#16a34a;">—</div><div class="kpi-label">Em Estoque</div></div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:#dbeafe;">📍</div><div><div class="kpi-value" id="kpi-locado" style="color:#1d4ed8;">—</div><div class="kpi-label">Locados</div></div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:#fff7ed;">⚠️</div><div><div class="kpi-value" id="kpi-rma" style="color:#c2410c;">—</div><div class="kpi-label">RMA</div></div></div>
        <div class="kpi-card"><div class="kpi-icon" style="background:#f3e8ff;">🔖</div><div><div class="kpi-value" id="kpi-reservado" style="color:#7e22ce;">—</div><div class="kpi-label">Reservados</div></div></div>
      </div>
      <div class="toolbar">
        <div class="search-box"><span style="color:#9ca3af;">🔍</span><input id="search" placeholder="Buscar por modelo, serial, part number..." oninput="applyFilters()"></div>
        <select class="filter-select" id="filter-tipo" onchange="applyFilters()">
          <option value="">Todos os tipos</option>
          <option>Câmera</option><option>Acessório</option><option>Áudio</option><option>Controle Acesso</option>
        </select>
        <select class="filter-select" id="filter-status" onchange="applyFilters()">
          <option value="">Todos os status</option>
          <option>Estoque - Novo</option><option>Estoque - Usado</option><option>Locado</option>
          <option>Vendido</option><option>Reservado</option><option>Sucata</option>
          <option>Garantia / Assis. Técnica</option><option>Outro</option>
        </select>
        <button class="add-btn" id="add-btn" onclick="showNewModal()">+ Novo Equipamento</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Tipo</th><th>Part Number</th><th>Modelo</th><th>Serial</th>
            <th>Status</th><th>Cliente/Fornecedor</th><th>NF</th><th style="width:95px;">Ações</th>
          </tr></thead>
          <tbody id="table-body"><tr class="loading-row"><td colspan="8"><span class="spinner"></span>Carregando...</td></tr></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

    <div id="view-dashboard"><div id="dashboard-content"></div></div>
    <div id="view-alerts"><div id="alerts-content"></div></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-modal" id="detail-modal-content"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-overlay" onclick="if(event.target===this)closeEdit()">
  <div class="edit-modal" id="edit-modal-content"></div>
</div>

<script>
const SUPABASE_URL='https://iwufrqmzcvaiyzynodkg.supabase.co';
const SUPABASE_KEY='sb_publishable_DmZyxvf-35mPPIU8zWsPaw_Mku9P-7l';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const PAGE_SIZE=50;
let allData=[],filtered=[],page=0,currentUser=null,currentProfile=null;

const STATUS_COLORS={'Locado':'#1d4ed8','Vendido':'#15803d','Estoque - Novo':'#16a34a','Estoque - Usado':'#059669','Reservado':'#7e22ce','Sucata':'#dc2626','RMA':'#c2410c','Outro':'#6b7280','Garantia / Assis. Técnica':'#d97706','Saída Manutenção':'#d97706'};

function statusBadge(s){
  const m={'Locado':'badge-locado','Vendido':'badge-vendido','Estoque - Novo':'badge-estoque','Estoque - Usado':'badge-estoque','Reservado':'badge-reservado','Sucata':'badge-sucata','RMA':'badge-rma'};
  return `<span class="badge ${m[s]||'badge-outro'}">${s||'—'}</span>`;
}
function formatDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('pt-BR');}catch{return d;}}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-error');
  err.textContent=''; btn.disabled=true; btn.textContent='Entrando...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent='E-mail ou senha incorretos.';btn.disabled=false;btn.textContent='Entrar';return;}
  await initApp(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  allData=[];filtered=[];currentUser=null;currentProfile=null;
}

async function initApp(user){
  currentUser=user;
  const {data:profile}=await sb.from('usuarios').select('*').eq('id',user.id).single();
  currentProfile=profile;
  document.getElementById('user-name-display').textContent=profile?.nome||user.email;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  if(!['admin','gestor_axis'].includes(profile?.role)) document.getElementById('add-btn').style.display='none';
  await loadData();
}

async function loadData(){
  document.getElementById('table-body').innerHTML='<tr class="loading-row"><td colspan="8"><span class="spinner"></span>Carregando...</td></tr>';
  const {data,error}=await sb.from('equipamentos_axis').select('*').order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  allData=(data||[]).map(r=>({...r,alertas:getAlertas(r)}));
  updateKPIs();applyFilters();renderDashboard();renderAlerts();
}

function getAlertas(r){
  const i=[];
  if(!r.cliente_fornecedor&&r.status==='Locado')i.push('Cliente não informado');
  if(!r.nota_fiscal&&r.status==='Vendido')i.push('NF não informada');
  return i;
}

function updateKPIs(){
  document.getElementById('kpi-total').textContent=allData.length.toLocaleString('pt-BR');
  document.getElementById('kpi-estoque').textContent=allData.filter(d=>d.status?.includes('Estoque')).length;
  document.getElementById('kpi-locado').textContent=allData.filter(d=>d.status==='Locado').length;
  document.getElementById('kpi-rma').textContent=allData.filter(d=>d.status==='RMA').length;
  document.getElementById('kpi-reservado').textContent=allData.filter(d=>d.status==='Reservado').length;
}

function applyFilters(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const tipo=document.getElementById('filter-tipo').value;
  const status=document.getElementById('filter-status').value;
  filtered=allData.filter(r=>{
    if(tipo&&r.tipo!==tipo)return false;
    if(status&&r.status!==status)return false;
    if(q)return(r.serial||'').toLowerCase().includes(q)||(r.modelo||'').toLowerCase().includes(q)||(r.part_number||'').toLowerCase().includes(q)||(r.cliente_fornecedor||'').toLowerCase().includes(q);
    return true;
  });
  page=0;renderTable();
}

function renderTable(){
  const body=document.getElementById('table-body');
  if(!filtered.length){body.innerHTML='<tr class="loading-row"><td colspan="8">Nenhum equipamento encontrado</td></tr>';document.getElementById('pagination').innerHTML='';return;}
  const start=page*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);
  const canEdit=['admin','gestor_axis'].includes(currentProfile?.role);
  body.innerHTML=slice.map(r=>`
    <tr onclick="showDetail('${r.id}')">
      <td class="td-tipo">${r.tipo||'—'}</td>
      <td class="td-pn">${r.part_number||'—'}</td>
      <td class="td-modelo" title="${r.modelo||''}">${r.modelo||'—'}</td>
      <td class="td-serial">${r.serial||'—'}${r.alertas?.length?'<span style="display:inline-block;width:7px;height:7px;background:#ef4444;border-radius:50%;margin-left:6px;vertical-align:middle;"></span>':''}</td>
      <td>${statusBadge(r.status)}</td>
      <td class="td-cliente" title="${r.cliente_fornecedor||''}">${r.cliente_fornecedor||'—'}</td>
      <td class="td-nf">${r.nota_fiscal||'—'}</td>
      <td onclick="event.stopPropagation()"><div class="actions-cell">
        <button class="action-btn" onclick="showDetail('${r.id}')" title="Ver">👁</button>
        ${canEdit?`<button class="action-btn" onclick="showEditModal('${r.id}')" title="Editar">✏️</button>
        <button class="action-btn del" onclick="confirmDelete('${r.id}','${(r.serial||'').replace(/'/g,"\\'")}')">🗑</button>`:''}
      </div></td>
    </tr>`).join('');
  const total=filtered.length,totalPages=Math.ceil(total/PAGE_SIZE);
  document.getElementById('pagination').innerHTML=`
    <span>${start+1}–${Math.min(start+PAGE_SIZE,total)} de ${total} equipamentos</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>‹ Anterior</button>
      <button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages-1?'disabled':''}>Próxima ›</button>
    </div>`;
}

function goPage(p){page=p;renderTable();window.scrollTo(0,0);}

function showDetail(id){
  const r=allData.find(d=>d.id===id);if(!r)return;
  const canEdit=['admin','gestor_axis'].includes(currentProfile?.role);
  const alerts=r.alertas?.length?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px;margin-bottom:16px;">${r.alertas.map(a=>`<div style="font-size:12px;color:#dc2626;font-weight:500;">⚠ ${a}</div>`).join('')}</div>`:'';
  document.getElementById('detail-modal-content').innerHTML=`
    <div class="modal-header">
      <div>
        <div class="modal-title">${r.modelo||'—'}</div>
        <div class="modal-sub">${statusBadge(r.status)}<span style="color:#9ca3af;">·</span><span>${r.tipo||'—'}</span></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body">
      ${alerts}
      <div class="detail-grid">
        <div class="detail-field"><label>Part Number</label><span>${r.part_number||'—'}</span></div>
        <div class="detail-field"><label>Serial</label><span style="font-family:monospace;">${r.serial||'—'}</span></div>
        <div class="detail-field"><label>Nota Fiscal</label><span>${r.nota_fiscal||'—'}</span></div>
        <div class="detail-field"><label>Data</label><span>${formatDate(r.data_nota)}</span></div>
        <div class="detail-field"><label>Cliente / Fornecedor</label><span>${r.cliente_fornecedor||'—'}</span></div>
        <div class="detail-field"><label>Última Atualização</label><span>${formatDate(r.ultima_atualizacao)}</span></div>
      </div>
      ${r.observacao?`<div style="margin-top:4px;"><div style="font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Observação</div><div style="background:#f9fafb;padding:12px;border-radius:8px;font-size:13px;color:#374151;line-height:1.6;">${r.observacao}</div></div>`:''}
    </div>
    <div class="modal-footer">
      ${canEdit?`<button class="btn-primary" onclick="closeDetail();showEditModal('${r.id}')">✏ Editar</button>
      <button class="btn-danger" onclick="closeDetail();confirmDelete('${r.id}','${(r.serial||'').replace(/'/g,"\\'")}')">🗑 Excluir</button>`:''}
      <button class="btn-secondary" onclick="closeDetail()">Fechar</button>
    </div>`;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}

function showNewModal(){renderEditModal({});}
function showEditModal(id){const r=allData.find(d=>d.id===id)||{};renderEditModal(r);}

function renderEditModal(r){
  const isNew=!r.id;
  const statuses=['Estoque - Novo','Estoque - Usado','Locado','Vendido','Reservado','Sucata','Garantia / Assis. Técnica','Saída Manutenção','Outro'];
  const tipos=['Câmera','Acessório','Áudio','Controle Acesso','Outro'];
  document.getElementById('edit-modal-content').innerHTML=`
    <div class="modal-header">
      <div class="modal-title">${isNew?'+ Novo Equipamento':'Editar Equipamento'}</div>
      <button class="close-btn" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tipo</label>
          <select class="form-select" id="f-tipo">${tipos.map(t=>`<option ${r.tipo===t?'selected':''}>${t}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="f-status">${statuses.map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Part Number</label>
          <div class="pn-wrap">
            <input class="form-input" id="f-partnumber" value="${r.part_number||''}" placeholder="01997-001" oninput="lookupPartNumber(this.value)" autocomplete="off">
            <span class="pn-status" id="pn-status"></span>
            <div class="pn-suggestions" id="pn-suggestions"></div>
          </div></div>
        <div class="form-group"><label class="form-label">Serial *</label>
          <input class="form-input" id="f-serial" value="${r.serial||''}" placeholder="B8A44F..."></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label class="form-label">Modelo *</label>
          <input class="form-input" id="f-modelo" value="${r.modelo||''}" placeholder="Preenchido automaticamente..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nota Fiscal</label>
          <input class="form-input" id="f-nf" value="${r.nota_fiscal||''}" placeholder="12345"></div>
        <div class="form-group"><label class="form-label">Data da NF</label>
          <input class="form-input" id="f-data" type="date" value="${r.data_nota||''}"></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label class="form-label">Cliente / Fornecedor</label>
          <input class="form-input" id="f-cliente" value="${r.cliente_fornecedor||''}" placeholder="Nome do cliente..."></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label class="form-label">Observação</label>
          <textarea class="form-textarea" id="f-obs" placeholder="Notas adicionais...">${r.observacao||''}</textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
      <button class="btn-primary" onclick="saveEquipamento('${r.id||''}')">Salvar</button>
    </div>`;
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');}

let lookupTimeout=null;
async function lookupPartNumber(val){
  const statusEl=document.getElementById('pn-status');
  const suggestions=document.getElementById('pn-suggestions');
  if(!val||val.length<3){suggestions.style.display='none';statusEl.textContent='';return;}
  clearTimeout(lookupTimeout);statusEl.textContent='...';
  lookupTimeout=setTimeout(async()=>{
    try{
      const{data,error}=await sb.from('catalogo_axis').select('part_number,modelo,tipo').ilike('part_number',`%${val.trim()}%`).limit(8);
      if(error||!data?.length){statusEl.textContent='';suggestions.style.display='none';return;}
      const exact=data.find(d=>d.part_number.toLowerCase()===val.trim().toLowerCase());
      if(exact){applyLookup(exact);suggestions.style.display='none';statusEl.textContent='✓';return;}
      statusEl.textContent='';suggestions.style.display='block';
      suggestions.innerHTML=data.map(p=>{
        const ps=p.part_number.replace(/'/g,"\\'"),ms=p.modelo.replace(/'/g,"\\'"),ts=p.tipo.replace(/'/g,"\\'");
        return `<div class="pn-item" onclick="selectSuggestion('${ps}','${ms}','${ts}')"><span class="pn-code">${p.part_number}</span><span class="pn-name">${p.modelo}</span></div>`;
      }).join('');
    }catch(e){statusEl.textContent='';}
  },350);
}
function applyLookup(item){
  document.getElementById('f-modelo').value=item.modelo;
  const sel=document.getElementById('f-tipo');
  for(let o of sel.options){if(o.value===item.tipo){o.selected=true;break;}}
}
function selectSuggestion(pn,modelo,tipo){
  document.getElementById('f-partnumber').value=pn;
  applyLookup({modelo,tipo});
  document.getElementById('pn-suggestions').style.display='none';
  document.getElementById('pn-status').textContent='✓';
}

async function saveEquipamento(id){
  const payload={
    serial:document.getElementById('f-serial').value.trim(),
    modelo:document.getElementById('f-modelo').value.trim(),
    part_number:document.getElementById('f-partnumber').value.trim()||null,
    tipo:document.getElementById('f-tipo').value,
    status:document.getElementById('f-status').value,
    cliente_fornecedor:document.getElementById('f-cliente').value.trim()||null,
    nota_fiscal:document.getElementById('f-nf').value.trim()||null,
    data_nota:document.getElementById('f-data').value||null,
    observacao:document.getElementById('f-obs').value.trim()||null,
    ultima_atualizacao:new Date().toISOString()
  };
  if(!payload.serial||!payload.modelo){alert('Serial e Modelo são obrigatórios.');return;}
  let error;
  if(id){({error}=await sb.from('equipamentos_axis').update(payload).eq('id',id));}
  else{({error}=await sb.from('equipamentos_axis').insert(payload));}
  if(error){alert('Erro ao salvar: '+error.message);return;}
  closeEdit();await loadData();
}

async function confirmDelete(id,serial){
  if(!confirm(`Excluir o equipamento "${serial}"?\n\nEsta ação não pode ser desfeita.`))return;
  const{error}=await sb.from('equipamentos_axis').delete().eq('id',id);
  if(error){alert('Erro ao excluir: '+error.message);return;}
  await loadData();
}

function renderDashboard(){
  if(!allData.length)return;
  const total=allData.length;
  const locados=allData.filter(d=>d.status==='Locado').length;
  const estoque=allData.filter(d=>d.status?.includes('Estoque')).length;
  const alertas=allData.filter(d=>d.alertas?.length).length;
  const statusCounts={},tipoCounts={},clientMap={};
  allData.forEach(r=>{
    statusCounts[r.status]=(statusCounts[r.status]||0)+1;
    tipoCounts[r.tipo]=(tipoCounts[r.tipo]||0)+1;
    if(r.status==='Locado'&&r.cliente_fornecedor?.trim())clientMap[r.cliente_fornecedor.trim()]=(clientMap[r.cliente_fornecedor.trim()]||0)+1;
  });
  const topClientes=Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const barColors=['#2563eb','#16a34a','#7e22ce','#c2410c','#dc2626','#d97706','#6b7280','#0891b2'];
  document.getElementById('dashboard-content').innerHTML=`
    <div style="font-size:20px;font-weight:700;margin-bottom:20px;">Dashboard <span style="color:#6b7280;font-size:14px;font-weight:400;">— Visão geral</span></div>
    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="kpi-card"><div class="kpi-icon" style="background:#eff6ff;">📦</div><div><div class="kpi-value" style="color:#2563eb;">${total.toLocaleString('pt-BR')}</div><div class="kpi-label">Total</div></div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:#dbeafe;">📍</div><div><div class="kpi-value" style="color:#1d4ed8;">${locados}</div><div class="kpi-label">Locados</div></div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:#f0fdf4;">🗄️</div><div><div class="kpi-value" style="color:#16a34a;">${estoque}</div><div class="kpi-label">Em Estoque</div></div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:#fef2f2;">⚠️</div><div><div class="kpi-value" style="color:#dc2626;">${alertas}</div><div class="kpi-label">Com Alertas</div></div></div>
    </div>
    <div class="dash-grid-2">
      <div class="chart-card"><div class="chart-title">Por Status</div>
        ${Object.entries(statusCounts).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
          <div class="bar-item"><div class="bar-top"><span style="font-size:12px;color:#374151;">${s}</span><span style="font-size:12px;font-weight:600;">${c}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(c/total*100).toFixed(1)}%;background:${STATUS_COLORS[s]||'#6b7280'};"></div></div></div>`).join('')}
      </div>
      <div class="chart-card"><div class="chart-title">Top Clientes em Locação</div>
        ${topClientes.map(([c,n])=>`<div class="client-row"><span style="font-size:13px;">${c}</span><span class="client-cnt">${n} equip.</span></div>`).join('')}
        ${!topClientes.length?'<div style="font-size:13px;color:#9ca3af;text-align:center;padding:20px;">Nenhum equipamento locado</div>':''}
      </div>
    </div>
    <div class="dash-grid-2" style="margin-top:16px;">
      <div class="chart-card"><div class="chart-title">Por Tipo</div>
        ${Object.entries(tipoCounts).sort((a,b)=>b[1]-a[1]).map(([t,c],i)=>`
          <div class="bar-item"><div class="bar-top"><span style="font-size:12px;color:#374151;">${t}</span><span style="font-size:12px;font-weight:600;">${c} (${(c/total*100).toFixed(1)}%)</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(c/total*100).toFixed(1)}%;background:${barColors[i%barColors.length]};"></div></div></div>`).join('')}
      </div>
    </div>`;
}

function renderAlerts(){
  const withAlerts=allData.filter(d=>d.alertas?.length);
  document.getElementById('alerts-tab-btn').textContent=`△ Alertas (${withAlerts.length})`;
  const byType={};
  withAlerts.forEach(r=>r.alertas.forEach(a=>{if(!byType[a])byType[a]=[];byType[a].push(r);}));
  document.getElementById('alerts-content').innerHTML=`
    <div style="font-size:20px;font-weight:700;margin-bottom:4px;">Alertas</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:20px;">${withAlerts.length} equipamentos com pendências</div>
    ${!withAlerts.length?'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:40px;text-align:center;color:#9ca3af;">✓ Nenhum alerta pendente</div>':''}
    ${Object.entries(byType).map(([type,items])=>`
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <span class="alert-tag">${type}</span>
          <span style="font-size:12px;color:#6b7280;">${items.length} equipamentos</span>
        </div>
        ${items.slice(0,30).map(r=>`
          <div class="alert-card" onclick="switchView('inventory');setTimeout(()=>showDetail('${r.id}'),100)">
            <div class="alert-top"><span class="alert-serial">${r.serial}</span>${statusBadge(r.status)}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:3px;">${r.modelo} · ${r.tipo}${r.cliente_fornecedor?' · '+r.cliente_fornecedor:''}</div>
          </div>`).join('')}
      </div>`).join('')}`;
}

function switchView(v){
  document.getElementById('view-inventory').style.display=v==='inventory'?'block':'none';
  document.getElementById('view-dashboard').style.display=v==='dashboard'?'block':'none';
  document.getElementById('view-alerts').style.display=v==='alerts'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['inventory','dashboard','alerts'][i]===v));
}

window.addEventListener('load',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user)await initApp(session.user);
  document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});
</script>
</body>
</html>
